apiVersion: shipwright.io/v1beta1
kind: Build
metadata:
  name: lemonade-server
  namespace: bootc
spec:
  source:
    type: Git
    git:
      url: https://github.com/lemonade-sdk/lemonade.git
      revision: main
  strategy:
    name: buildah-high-performance
    kind: ClusterBuildStrategy
  paramValues:
    - name: dockerfile
      value: Dockerfile
  output:
    image: image-registry.openshift-image-registry.svc:5000/bootc/lemonade-server:latest
